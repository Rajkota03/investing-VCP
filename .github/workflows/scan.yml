name: VCP Scanner

on:
  schedule:
    # 4:00 PM IST = 10:30 UTC (weekdays only)
    - cron: "30 10 * * 1-5"
  workflow_dispatch: # manual trigger button

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VCP Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py

      - name: Commit scan results
        run: |
          git config user.name "VCP Scanner Bot"
          git config user.email "bot@vcpscanner.local"
          git add output/
          git diff --cached --quiet || git commit -m "scan: $(date +'%d %b %Y %H:%M') IST"
          git push
