name: VCP Scanner

on:
  # Scheduled runs disabled — GitHub's US runners are geo-blocked by NSE.
  # The daily scan now runs from an Oracle Cloud VM in Mumbai (Indian IP).
  # This workflow stays available as a manual trigger / emergency fallback;
  # it WILL fail (returns 0 setups) but won't overwrite real data because
  # run.py exits non-zero when fetch_all_prices comes back empty.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run VCP Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run.py

      - name: Commit scan results
        run: |
          git config user.name "VCP Scanner Bot"
          git config user.email "bot@vcpscanner.local"
          git add output/
          git diff --cached --quiet || git commit -m "scan: $(date +'%d %b %Y %H:%M') IST"
          git push
